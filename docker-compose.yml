services:
  db:
    # PostGIS image (Postgres + spatial extensions) for production geometry support.
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: heatshield
      POSTGRES_USER: heatshield
      POSTGRES_PASSWORD: heatshield
    ports:
      - "5432:5432"
    volumes:
      - heatshield_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heatshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://heatshield:heatshield@db:5432/heatshield
      APP_ENV: production
      FRONTEND_URL: http://localhost:8000
      WEATHER_PROVIDER: open-meteo
      SATELLITE_PROVIDER: none
      # Add live-provider keys here or via an env_file; never commit real values.
    ports:
      - "8000:8000"
    # Run migrations, then start the server.
    command: sh -c "alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  # Optional Redis cache — enable by setting CACHE_URL=redis://cache:6379/0 on app.
  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles: ["with-cache"]

volumes:
  heatshield_postgres:
